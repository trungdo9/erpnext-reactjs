<!doctype html>
<html lang="vi">
<head>
  <script>
    (function(){
      var t = localStorage.getItem('theme');
      if (!t) t = 'light';
      if (t === 'dark') document.documentElement.classList.add('dark');
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1e40af" />
  <meta name="description" content="Hệ thống quản lý sản xuất & kho thép cuộn" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">
  <title>Steel ERP - Quản lý Thép</title>
</head>
<body style="background: #f8fafc; min-height: 100vh;">
  <div id="root">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:Inter,sans-serif;">
      <div style="width:40px;height:40px;border:3px solid #ddd;border-top-color:#1e40af;border-radius:50;animation:spin 1s linear infinite;"></div>
      <p style="margin-top:16px;font-size:14px;font-weight:500;color:#333;">Steel ERP</p>
    </div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
